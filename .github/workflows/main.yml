name: Build Android Arm64

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. NDK ───────────────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      # ── 3. Tools ─────────────────────────────────────────────────────────────
      - name: Install build tools
        run: sudo apt-get install -y ninja-build cmake

      # ── 4. Prebuilt lib guards ───────────────────────────────────────────────
      - name: Verify prebuilt libs are present
        run: |
          MISSING=0
          check() {
            if [ ! -f "$1" ]; then
              echo "ERROR: $1 not found"
              MISSING=1
            else
              echo "OK: $1"
            fi
          }
          check "app/src/main/cpp/libs/arm64-v8a/libdobby.a"
          check "app/src/main/cpp/libs/arm64-v8a/libBNM.a"
          if [ $MISSING -ne 0 ]; then
            echo "One or more prebuilt libs are missing. Commit them to the repo."
            exit 1
          fi

      # ── 5. Download curl source ───────────────────────────────────────────────
      - name: Download curl source
        run: |
          CURL_VER=8.7.1
          wget -q "https://github.com/curl/curl/releases/download/curl-8_7_1/curl-${CURL_VER}.tar.gz" \
            -O curl.tar.gz
          tar xf curl.tar.gz
          echo "CURL_SRC=$PWD/curl-${CURL_VER}" >> $GITHUB_ENV

      # ── 6. Cross-compile curl (static) for arm64-v8a ──────────────────────────
      - name: Build curl for arm64-v8a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B curl-build \
            -S "$CURL_SRC" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/curl-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DCURL_STATICLIB=ON \
            -DCURL_ENABLE_SSL=OFF \
            -DCURL_USE_OPENSSL=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_LIBSSH2=OFF \
            -DCURL_USE_PKGCONFIG=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF
          cmake --build curl-build --parallel
          cmake --install curl-build

      # ── 7. Configure the main project ────────────────────────────────────────
      - name: Configure CMake
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B build \
            -S app/src/main/cpp \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_PLATFORM_LEVEL=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DCURL_DIR="$PWD/curl-install/lib/cmake/CURL" \
            -DBNM_INCLUDE="$PWD/app/src/main/cpp/ByNameModding/include" \
            -DBNM_EXTERNAL_INCLUDE="$PWD/app/src/main/cpp/ByNameModding/external/include"

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 9. Upload ───────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Polar-ImGui-Arm64
          path: build/**/*.so
          if-no-files-found: error
