name: Build Android Arm64

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. NDK ───────────────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      # ── 3. Tools ─────────────────────────────────────────────────────────────
      - name: Install build tools
        run: sudo apt-get install -y ninja-build cmake

      # ── 4. Dobby guard ───────────────────────────────────────────────────────
      - name: Verify libdobby.a is present
        run: |
          DOBBY_PATH="app/src/main/cpp/libs/arm64-v8a/libdobby.a"
          if [ ! -f "$DOBBY_PATH" ]; then
            echo "ERROR: $DOBBY_PATH not found."
            echo "Commit the prebuilt libdobby.a to the repository at that path."
            exit 1
          fi
          echo "libdobby.a found – OK"

      # ── 5. Download curl source ───────────────────────────────────────────────
      - name: Download curl source
        run: |
          CURL_VER=8.7.1
          wget -q "https://github.com/curl/curl/releases/download/curl-8_7_1/curl-${CURL_VER}.tar.gz" \
            -O curl.tar.gz
          tar xf curl.tar.gz
          echo "CURL_SRC=$PWD/curl-${CURL_VER}" >> $GITHUB_ENV

      # ── 6. Cross-compile curl (static) for arm64-v8a ──────────────────────────
      - name: Build curl for arm64-v8a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B curl-build \
            -S "$CURL_SRC" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/curl-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DCURL_STATICLIB=ON \
            -DCURL_ENABLE_SSL=OFF \
            -DCURL_USE_OPENSSL=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_LIBSSH2=OFF \
            -DCURL_USE_PKGCONFIG=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF

          cmake --build curl-build --parallel
          cmake --install curl-build

      # ── 7. Fix curl CMake config case mismatch ───────────────────────────────
      # The project's CMakeLists.txt calls find_package(curl CONFIG REQUIRED)
      # with a lowercase 'curl'. On Linux (case-sensitive filesystem) CMake looks
      # for curlConfig.cmake or curl-config.cmake — but curl's build system
      # installs CURLConfig.cmake (uppercase). These names do not match.
      #
      # We create lowercase symlinks so both the config file and the hint
      # variable curl_DIR resolve correctly.
      - name: Create lowercase curl CMake config symlinks
        run: |
          CURL_CMAKE_DIR="$PWD/curl-install/lib/cmake/CURL"

          echo "--- Installed curl cmake files ---"
          find curl-install -name "*.cmake" | sort
          echo "---------------------------------"

          # curlConfig.cmake  →  CURLConfig.cmake
          ln -s "$CURL_CMAKE_DIR/CURLConfig.cmake" \
                "$CURL_CMAKE_DIR/curlConfig.cmake"

          # curlConfigVersion.cmake  →  CURLConfigVersion.cmake (if present)
          if [ -f "$CURL_CMAKE_DIR/CURLConfigVersion.cmake" ]; then
            ln -s "$CURL_CMAKE_DIR/CURLConfigVersion.cmake" \
                  "$CURL_CMAKE_DIR/curlConfigVersion.cmake"
          fi

          echo "--- After symlinking ---"
          ls -la "$CURL_CMAKE_DIR/"
          echo "------------------------"

      # ── 8. Configure the main project ────────────────────────────────────────
      # curl_DIR (lowercase) matches find_package(curl ...) in CMakeLists.txt.
      # It points at the directory now containing curlConfig.cmake.
      - name: Configure CMake
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B build \
            -S app/src/main/cpp \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_PLATFORM_LEVEL=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -Dcurl_DIR="$PWD/curl-install/lib/cmake/CURL"

      # ── 9. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 10. Upload ───────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Polar-ImGui-Arm64
          path: build/**/*.so
          if-no-files-found: error
