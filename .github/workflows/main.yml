name: Build Android Arm64

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. NDK ───────────────────────────────────────────────────────────────
      # The action exposes the path via outputs.ndk-path, NOT $ANDROID_NDK_ROOT.
      # We capture it with an id so every later step can use it consistently.
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true   # puts clang / cmake wrappers on PATH

      # ── 3. Tools ─────────────────────────────────────────────────────────────
      - name: Install build tools
        run: sudo apt-get install -y ninja-build cmake

      # ── 4. Dobby guard ───────────────────────────────────────────────────────
      # libdobby.a must exist at app/src/main/cpp/libs/arm64-v8a/libdobby.a.
      # If it is NOT committed to the repo this step will fail fast and tell you
      # exactly what is missing rather than producing a cryptic linker error.
      - name: Verify libdobby.a is present
        run: |
          DOBBY_PATH="app/src/main/cpp/libs/arm64-v8a/libdobby.a"
          if [ ! -f "$DOBBY_PATH" ]; then
            echo "ERROR: $DOBBY_PATH not found."
            echo "Commit the prebuilt libdobby.a to the repository at that path."
            exit 1
          fi
          echo "libdobby.a found – OK"

      # ── 5. Cross-compile curl (static) for arm64-v8a ─────────────────────────
      # The CMakeLists.txt calls find_package(curl REQUIRED CONFIG) and links
      # against curl::curl_static. There is no Android arm64 curl on the runner,
      # so we build curl from source using the same NDK toolchain and install it
      # to a local prefix that we pass to CMake in the next step.
      #
      # SSL is disabled here (CURL_ENABLE_SSL=OFF) to keep the build
      # self-contained. If you need HTTPS in your mod menu you can add a prior
      # step that cross-compiles OpenSSL for arm64 and pass its prefix to curl
      # via -DOPENSSL_ROOT_DIR=...
      - name: Download curl source
        run: |
          CURL_VER=8.7.1
          curl -fsSL "https://curl.se/download/curl-${CURL_VER}.tar.gz" \
            -o curl.tar.gz
          tar xf curl.tar.gz
          echo "CURL_SRC=$PWD/curl-${CURL_VER}" >> $GITHUB_ENV

      - name: Build curl for arm64-v8a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B curl-build \
            -S "$CURL_SRC" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/curl-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCURL_STATICLIB=ON \
            -DCURL_ENABLE_SSL=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_LIBSSH2=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF

          cmake --build curl-build --parallel
          cmake --install curl-build

      # ── 6. Configure the main project ────────────────────────────────────────
      # Key fixes vs the original workflow:
      #   • NDK path comes from steps.setup-ndk.outputs.ndk-path (not $ANDROID_NDK_ROOT)
      #   • -Dcurl_DIR points CMake at the config files we just installed
      #   • -DANDROID_PLATFORM_LEVEL=21 prevents the FATAL_ERROR in CMakeLists.txt
      #     (the legacy toolchain does not set ANDROID_PLATFORM_LEVEL automatically)
      - name: Configure CMake
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B build \
            -S app/src/main/cpp \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_PLATFORM_LEVEL=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -Dcurl_DIR="$PWD/curl-install/lib/cmake/CURL"

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 8. Upload ────────────────────────────────────────────────────────────
      # Use a recursive glob – the .so may land in a subdirectory of build/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Polar-ImGui-Arm64
          path: build/**/*.so
          if-no-files-found: error   # fail loudly rather than uploading nothing
