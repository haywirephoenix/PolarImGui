name: Build Android Arm64

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. NDK ───────────────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      # ── 3. Tools ─────────────────────────────────────────────────────────────
      - name: Install build tools
        run: sudo apt-get install -y ninja-build cmake

      # ── 4. Dobby guard ───────────────────────────────────────────────────────
      - name: Verify libdobby.a is present
        run: |
          DOBBY_PATH="app/src/main/cpp/libs/arm64-v8a/libdobby.a"
          if [ ! -f "$DOBBY_PATH" ]; then
            echo "ERROR: $DOBBY_PATH not found."
            echo "Commit the prebuilt libdobby.a to the repository at that path."
            exit 1
          fi
          echo "libdobby.a found – OK"

      # ── 5. Cross-compile curl (static) for arm64-v8a ─────────────────────────
      # curl's CMake build installs its config file as:
      #   <prefix>/lib/cmake/CURL/CURLConfig.cmake   (uppercase CURL)
      # The correct CMake hint variable is therefore CURL_DIR (uppercase),
      # not curl_DIR. This was the root cause of the "Could not find a package
      # configuration file" error in the previous run.
      #
      # Additional flags vs the previous attempt:
      #   BUILD_STATIC_LIBS=ON      – the correct flag to produce libcurl.a
      #   CURL_STATICLIB=ON         – tells curl's own headers it is static
      #   CURL_USE_PKGCONFIG=OFF    – pkg-config finds host libs, not Android ones
      #   CURL_USE_OPENSSL=OFF      – avoids needing a cross-compiled OpenSSL
      #   CURL_ENABLE_SSL=OFF       – belt-and-suspenders: no SSL backend at all
      - name: Download curl source
        run: |
          CURL_VER=8.7.1
          # GitHub releases mirror – avoids the curl.se 403 on Actions runners
          wget -q "https://github.com/curl/curl/releases/download/curl-8_7_1/curl-${CURL_VER}.tar.gz" \
            -O curl.tar.gz
          tar xf curl.tar.gz
          echo "CURL_SRC=$PWD/curl-${CURL_VER}" >> $GITHUB_ENV

      - name: Build curl for arm64-v8a
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B curl-build \
            -S "$CURL_SRC" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/curl-install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DCURL_STATICLIB=ON \
            -DCURL_ENABLE_SSL=OFF \
            -DCURL_USE_OPENSSL=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_LIBSSH2=OFF \
            -DCURL_USE_PKGCONFIG=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF

          cmake --build curl-build --parallel
          cmake --install curl-build

          # Sanity-check: confirm the config file exists where we expect it
          # before handing control to the main project configure step.
          echo "--- Installed curl cmake files ---"
          find curl-install -name "*.cmake" | sort
          echo "---------------------------------"

      # ── 6. Configure the main project ────────────────────────────────────────
      # CURL_DIR (uppercase) is the correct hint variable for CURLConfig.cmake.
      # curl_DIR (lowercase) is silently ignored by CMake's find_package, which
      # is why the previous run could not locate the config file even though it
      # had been installed correctly.
      - name: Configure CMake
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja \
            -B build \
            -S app/src/main/cpp \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_PLATFORM_LEVEL=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCURL_DIR="$PWD/curl-install/lib/cmake/CURL"

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── 8. Upload ────────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Polar-ImGui-Arm64
          path: build/**/*.so
          if-no-files-found: error
